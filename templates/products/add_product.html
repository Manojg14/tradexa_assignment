{% extends 'base.html' %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<div class="container">

    <div class="card">
        <h2>Add New Product</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Product Name</label>
                {{ form.name }}
            </div>

            <div class="form-group">
                <label>Weight (kg)</label>
                {{ form.weight }}
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                {{ form.price }}
            </div>

            <button type="submit" class="btn btn-primary">
                Save Product
            </button>

            <br><br>

            <a href="{% url 'products' %}" class="btn">
                Back to Products
            </a>

        </form>
    </div>

</div>

{% endblock %}
